<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aml Store - Il Tuo partner digitale</title>
    <link rel="icon" href="favicon/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    
    <!-- Font Google simile a quello dell'immagine -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap');

        /* Stili base per la demo della pagina */
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f6f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Prevenzione CLS & Sticky Header */
        ecommerce-header {
            display: block;
            position: sticky;
            top: 0;
            z-index: 1000;
            min-height: 80px; /* Riserva lo spazio prima che il JS carichi l'header */
        }

        /* Il main occupa lo spazio flessibile per spingere il footer in basso in pagine corte */
        main {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        h1 { font-weight: 800; font-size: 2.5rem; color: #2d2d2d; margin-bottom: 0.5rem; }
        p.subtitle { line-height: 1.8; color: #666; font-weight: 500; margin-bottom: 3rem; }
        
        /* Griglia di Card per lo Scroll Test */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            height: 380px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .skeleton-img { 
            background: #f0f2f5; 
            height: 200px; 
            border-radius: 8px; 
            display: grid;
            place-items: center;
            color: #ccc;
        }

        .skeleton-img svg { width: 48px; height: 48px; }

        .skeleton-text { 
            background: #e4e6eb; 
            height: 16px; 
            border-radius: 4px; 
            width: 90%; 
        }

        .skeleton-text.short { width: 60%; }
        .skeleton-text.price { width: 30%; height: 24px; margin-top: auto; background: #d0d4db; }
        
        ecommerce-footer {
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

                <div class="skeleton-text"></div>

                            <a href="#" style="color:#333; text-decoration:none;">Sistemi Operativi</a>
                            <a href="#" style="color:#333; text-decoration:none;">Office</a>
                            <a href="#" style="color:#333; text-decoration:none;">Antivirus</a>

                        <div style="margin-top:auto; font-size:14px; color:#666;">
                            Assistenza: +39 02 1234 5678
                        </div>
                    </div>
                `;
            }

            connectedCallback() {
                const toggle = this.shadowRoot.querySelector('.mobile-toggle');
                const close = this.shadowRoot.querySelector('.close-drawer');
                const overlay = this.shadowRoot.querySelector('.overlay');
                const drawer = this.shadowRoot.querySelector('.mobile-drawer');

                const openMenu = () => {
                    drawer.classList.add('open');
                    overlay.classList.add('open');
                };

                const closeMenu = () => {
                    drawer.classList.remove('open');
                    overlay.classList.remove('open');
                };

                if(toggle) toggle.addEventListener('click', openMenu);
                if(close) close.addEventListener('click', closeMenu);
                if(overlay) overlay.addEventListener('click', closeMenu);
            }
        }
        if (!customElements.get('ecommerce-header')) {
            customElements.define('ecommerce-header', EcommerceHeader);
        }
