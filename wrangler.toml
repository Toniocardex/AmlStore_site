# Aml Store — Cloudflare Pages + Functions
# Doc: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name                   = "aml-store"
pages_build_output_dir = "."
compatibility_date     = "2024-09-23"
compatibility_flags    = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────────────────────────────
# Creare il DB con: wrangler d1 create aml-orders
# Poi sostituire database_id con quello ottenuto dal comando
[[d1_databases]]
binding       = "DB"
database_name = "aml-orders"
database_id   = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ── Variabili non-segrete (ok in repo) ───────────────────────────────────────
[vars]
SITE_ORIGIN   = "https://aml-store.com"
PAYPAL_BASE_URL = "https://api-m.sandbox.paypal.com"
# Prima del go-live cambiare PAYPAL_BASE_URL in: https://api-m.paypal.com

# ── Segreti (MAI committare — impostare con `wrangler secret put <NAME>`) ────
# TOKEN_SECRET           — stringa random ≥32 caratteri per HMAC token thank-you
# RESEND_API_KEY         — API key Resend (re_xxxx...)
# TRUSTPILOT_BCC         — indirizzo ...+token@invite.trustpilot.com
# STRIPE_SECRET_KEY      — sk_live_... (o sk_test_... in sviluppo)
# STRIPE_WEBHOOK_SECRET  — whsec_... da Stripe Dashboard > Webhooks
# PAYPAL_CLIENT_ID       — Client ID PayPal server-side (live o sandbox)
# PAYPAL_CLIENT_SECRET   — Client Secret PayPal server-side
