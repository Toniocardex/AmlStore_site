# Aml-Store.com — Cloudflare Pages (The Vault Edition)
# Dominio produzione: https://Aml-Store.com (aggiungi in Pages → Custom domains)
name = "aml-store-site"
pages_build_output_dir = "."
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_name = "aml-store-d1"
# Produzione: crea il database con `npx wrangler d1 create aml-store-d1` e incolla qui l’UUID restituito.
database_id = "00000000-0000-4000-8000-000000000001"

# CMS / download: bucket R2 per asset digitali (upload da La Cassaforte → binding `VAULT`).
# Secret API admin: imposta `ADMIN_API_SECRET` in Pages → Settings → Environment variables
# (e in `.dev.vars` per `wrangler pages dev`). Il CMS invia `Authorization: Bearer <secret>`.
# [[r2_buckets]]
# binding = "VAULT"
# bucket_name = "aml-store-vault"
