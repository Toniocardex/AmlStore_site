<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping cart — Aml Store</title>
    <meta name="description" content="Your Aml Store cart: line items, totals, and checkout.">
    <meta name="robots" content="index, follow">
    <script src="../js/consent-init.js"></script>

    <link rel="icon" href="../favicon/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="../favicon/apple-touch-icon.png">
    <link rel="canonical" href="https://aml-store.com/en/cart.html">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Aml Store">
    <meta property="og:title" content="Shopping cart — Aml Store">
    <meta property="og:description" content="Your Aml Store cart: line items, totals, and checkout.">
    <meta property="og:url" content="https://aml-store.com/en/cart.html">
    <meta property="og:locale" content="en_US">
    <meta property="og:image" content="https://aml-store.com/logo/logo-header-400.webp">

    <link rel="alternate" hreflang="it" href="https://aml-store.com/it/cart.html">
    <link rel="alternate" hreflang="en" href="https://aml-store.com/en/cart.html">
    <link rel="alternate" hreflang="fr" href="https://aml-store.com/fr/cart.html">
    <link rel="alternate" hreflang="de" href="https://aml-store.com/de/cart.html">
    <link rel="alternate" hreflang="es" href="https://aml-store.com/es/cart.html">
    <link rel="alternate" hreflang="x-default" href="https://aml-store.com/it/cart.html">

    <link rel="stylesheet" href="../fonts/montserrat.css">
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/cart.css">
    <script src="../js/theme-init.js"></script>
    <!-- Optional: Stripe Payment Links per SKU (HTTPS). -->
    <!-- <script>window.AML_STRIPE_PAYMENT_LINK_BY_SKU = { "microsoft-365-family-12m": "https://buy.stripe.com/..." };</script> -->
    <script type="application/ld+json">
{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://aml-store.com/#organization","name":"Aml Store","url":"https://aml-store.com/","logo":{"@type":"ImageObject","url":"https://aml-store.com/logo/logo-header-400.webp"},"email":"Info@amlstore.it"},{"@type":"WebSite","@id":"https://aml-store.com/#website","url":"https://aml-store.com/","name":"Aml Store","inLanguage":["it","en","fr","de","es"],"publisher":{"@id":"https://aml-store.com/#organization"}},{"@type":"WebPage","@id":"https://aml-store.com/en/cart.html#webpage","url":"https://aml-store.com/en/cart.html","name":"Shopping cart — Aml Store","description":"Your Aml Store cart: line items, totals, and checkout.","isPartOf":{"@id":"https://aml-store.com/#website"},"inLanguage":"en"}]}
    </script>
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <ecommerce-header translate="no" class="notranslate"></ecommerce-header>

    <main id="main" class="cart-page">
        <nav class="cart-breadcrumbs" aria-label="Breadcrumb">
            <a href="/en/">Home</a>
            <span class="sep" aria-hidden="true">/</span>
            <span aria-current="page">Cart</span>
        </nav>

        <h1>Shopping cart</h1>
        <p class="cart-lead">Your cart is stored in this browser (localStorage). Displayed prices must match the product page and the final checkout.</p>

        <div
            id="aml-cart-app"
            data-label-remove="Remove"
            data-qty-aria="Quantity"
            data-label-qty-minus="Decrease quantity for"
            data-label-qty-plus="Increase quantity for"
        >
            <div id="aml-cart-empty" class="cart-empty-panel">
                <p>Your cart is empty.</p>
                <p><a class="cart-btn cart-btn-primary" href="/en/#catalogo">Back to catalogue</a></p>
            </div>

            <div id="aml-cart-filled" class="cart-filled" hidden>
                <div class="cart-table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th scope="col">Product</th>
                                <th scope="col">Qty</th>
                                <th scope="col">Subtotal</th>
                                <th scope="col"><span class="visually-hidden">Actions</span></th>
                            </tr>
                        </thead>
                        <tbody id="aml-cart-lines"></tbody>
                    </table>
                </div>
                <p class="cart-total-row">Total: <strong id="aml-cart-total">—</strong></p>
                <div class="cart-actions">
                    <a class="cart-btn cart-btn-primary" href="/en/checkout.html">Proceed to checkout</a>
                    <button type="button" id="aml-cart-clear" class="cart-btn cart-btn-ghost">Clear cart</button>
                </div>
            </div>
        </div>
    </main>

    <aml-cookie-banner></aml-cookie-banner>
    <ecommerce-footer translate="no" class="notranslate"></ecommerce-footer>

    <script src="../js/locale-path.js"></script>
    <script src="../js/cart.js" defer></script>
    <script src="../components/cookie-banner.js" defer></script>
    <script src="../components/header.js" defer></script>
    <script src="../components/footer.js" defer></script>
</body>
</html>
