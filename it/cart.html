<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello — Aml Store</title>
    <meta name="description" content="Riepilogo del carrello Aml Store: articoli, totali e checkout.">
    <meta name="robots" content="index, follow">
    <script src="../js/consent-init.js"></script>

    <link rel="icon" href="../favicon/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="../favicon/apple-touch-icon.png">
    <link rel="canonical" href="https://aml-store.com/it/cart.html">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Aml Store">
    <meta property="og:title" content="Carrello — Aml Store">
    <meta property="og:description" content="Riepilogo del carrello Aml Store: articoli, totali e checkout.">
    <meta property="og:url" content="https://aml-store.com/it/cart.html">
    <meta property="og:locale" content="it_IT">
    <meta property="og:image" content="https://aml-store.com/logo/logo-header-400.webp">

    <link rel="alternate" hreflang="it" href="https://aml-store.com/it/cart.html">
    <link rel="alternate" hreflang="en" href="https://aml-store.com/en/cart.html">
    <link rel="alternate" hreflang="fr" href="https://aml-store.com/fr/cart.html">
    <link rel="alternate" hreflang="de" href="https://aml-store.com/de/cart.html">
    <link rel="alternate" hreflang="es" href="https://aml-store.com/es/cart.html">
    <link rel="alternate" hreflang="x-default" href="https://aml-store.com/it/cart.html">

    <link rel="stylesheet" href="../fonts/montserrat.css">
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/cart.css">
    <script src="../js/theme-init.js"></script>
    <!-- Opzionale: Payment Link Stripe per SKU (HTTPS). -->
    <!-- <script>window.AML_STRIPE_PAYMENT_LINK_BY_SKU = { "microsoft-365-family-12m": "https://buy.stripe.com/..." };</script> -->

    </script>
</head>
<body>
    <a class="skip-link" href="#main">Vai al contenuto principale</a>

    <ecommerce-header translate="no" class="notranslate"></ecommerce-header>

    <main id="main" class="cart-page">
        <nav class="cart-breadcrumbs" aria-label="Percorso navigazione">
            <a href="/it/">Home</a>
            <span class="sep" aria-hidden="true">/</span>
            <span aria-current="page">Carrello</span>
        </nav>

        <h1>Carrello</h1>
        <p class="cart-lead">Il carrello è salvato in questo browser (localStorage). I prezzi mostrati devono coincidere con scheda prodotto e checkout finale.</p>

        <div
            id="aml-cart-app"
            data-label-remove="Rimuovi"
            data-qty-aria="Quantità"
            data-label-qty-minus="Riduci quantità per"
            data-label-qty-plus="Aumenta quantità per"
        >
            <div id="aml-cart-empty" class="cart-empty-panel" hidden>
                <p>Il carrello è vuoto.</p>
                <p><a class="cart-btn cart-btn-primary" href="/it/#catalogo">Torna al catalogo</a></p>
            </div>

            <div id="aml-cart-filled" class="cart-filled" hidden>
                <div class="cart-table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th scope="col">Prodotto</th>
                                <th scope="col">Qtà</th>
                                <th scope="col">Subtotale</th>
                                <th scope="col"><span class="visually-hidden">Azioni</span></th>
                            </tr>
                        </thead>
                        <tbody id="aml-cart-lines"></tbody>
                    </table>
                </div>
                <p class="cart-total-row">Totale: <strong id="aml-cart-total">—</strong></p>
                <div class="cart-actions">
                    <a class="cart-btn cart-btn-primary" href="/it/checkout.html">Procedi al checkout</a>
                </div>
            </div>
        </div>
    </main>

    <aml-cookie-banner></aml-cookie-banner>
    <ecommerce-footer translate="no" class="notranslate"></ecommerce-footer>

    <script src="../js/locale-path.js"></script>
    <script src="../js/cart.js" defer></script>
    <script src="../components/cookie-banner.js" defer></script>
    <script src="../components/header.js" defer></script>
    <script src="../components/footer.js" defer></script>
</body>
</html>
