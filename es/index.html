<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aml Store - Tu Socio Digital</title>
    <meta name="description" content="Compra licencias de software originales: Sistemas Operativos, Office y Antivirus al mejor precio garantizado.">

    <link rel="icon" href="/favicon/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png">
    <link rel="canonical" href="/es/">

    <link rel="alternate" hreflang="it"       href="/it/">
    <link rel="alternate" hreflang="en"       href="/en/">
    <link rel="alternate" hreflang="fr"       href="/fr/">
    <link rel="alternate" hreflang="de"       href="/de/">
    <link rel="alternate" hreflang="es"       href="/es/">
    <link rel="alternate" hreflang="x-default" href="/it/">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap');

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f6f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        ecommerce-header {
            display: block;
            position: sticky;
            top: 0;
            z-index: 1000;
            min-height: 84px;
        }

        main {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 0;
            isolation: isolate;
        }

        h1 { font-weight: 800; font-size: 2.5rem; color: #2d2d2d; margin-bottom: 0.5rem; }
        p.subtitle { line-height: 1.8; color: #666; font-weight: 500; margin-bottom: 3rem; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            height: 380px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .skeleton-img {
            background: #f0f2f5;
            height: 200px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: #ccc;
        }

        .skeleton-img svg { width: 48px; height: 48px; }

        .skeleton-text {
            background: #e4e6eb;
            height: 16px;
            border-radius: 4px;
            width: 90%;
        }

        .skeleton-text.short { width: 60%; }
        .skeleton-text.price { width: 30%; height: 24px; margin-top: auto; background: #d0d4db; }

        ecommerce-footer {
            display: block;
            width: 100%;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <ecommerce-header></ecommerce-header>

    <main>
        <h1>Aml Store — Licencias de Software</h1>
        <p class="subtitle">Tu socio de confianza para la compra de licencias de software originales. Sistemas Operativos, Office y Antivirus al mejor precio garantizado.</p>

        <div class="product-grid">
            <div class="product-card">
                <div class="skeleton-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
                <div class="skeleton-text price"></div>
            </div>
            <div class="product-card">
                <div class="skeleton-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
                <div class="skeleton-text price"></div>
            </div>
            <div class="product-card">
                <div class="skeleton-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
                <div class="skeleton-text price"></div>
            </div>
            <div class="product-card">
                <div class="skeleton-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
                <div class="skeleton-text price"></div>
            </div>
        </div>
    </main>

    <ecommerce-footer></ecommerce-footer>

    <script src="/components/header.js" defer></script>
    <script src="/components/footer.js" defer></script>

</body>
</html>
