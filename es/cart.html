<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito — Aml Store</title>
    <meta name="description" content="Resumen del carrito Aml Store: artículos, totales y pago.">
    <meta name="robots" content="index, follow">
    <script src="../js/consent-init.js"></script>

    <link rel="icon" href="../favicon/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="../favicon/apple-touch-icon.png">
    <link rel="canonical" href="https://aml-store.com/es/cart.html">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Aml Store">
    <meta property="og:title" content="Carrito — Aml Store">
    <meta property="og:description" content="Resumen del carrito Aml Store: artículos, totales y pago.">
    <meta property="og:url" content="https://aml-store.com/es/cart.html">
    <meta property="og:locale" content="es_ES">
    <meta property="og:image" content="https://aml-store.com/logo/logo-header-400.webp">

    <link rel="alternate" hreflang="it" href="https://aml-store.com/it/cart.html">
    <link rel="alternate" hreflang="en" href="https://aml-store.com/en/cart.html">
    <link rel="alternate" hreflang="fr" href="https://aml-store.com/fr/cart.html">
    <link rel="alternate" hreflang="de" href="https://aml-store.com/de/cart.html">
    <link rel="alternate" hreflang="es" href="https://aml-store.com/es/cart.html">
    <link rel="alternate" hreflang="x-default" href="https://aml-store.com/it/cart.html">

    <link rel="stylesheet" href="../fonts/montserrat.css">
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/cart.css">
    <script src="../js/theme-init.js"></script>
    <!-- Opcional: enlaces de pago Stripe por SKU (HTTPS). -->
    <!-- <script>window.AML_STRIPE_PAYMENT_LINK_BY_SKU = { "microsoft-365-family-12m": "https://buy.stripe.com/..." };</script> -->
    <script type="application/ld+json">
{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://aml-store.com/#organization","name":"Aml Store","url":"https://aml-store.com/","logo":{"@type":"ImageObject","url":"https://aml-store.com/logo/logo-header-400.webp"},"email":"Info@amlstore.it"},{"@type":"WebSite","@id":"https://aml-store.com/#website","url":"https://aml-store.com/","name":"Aml Store","inLanguage":["it","en","fr","de","es"],"publisher":{"@id":"https://aml-store.com/#organization"}},{"@type":"WebPage","@id":"https://aml-store.com/es/cart.html#webpage","url":"https://aml-store.com/es/cart.html","name":"Carrito — Aml Store","description":"Resumen del carrito Aml Store: artículos, totales y pago.","isPartOf":{"@id":"https://aml-store.com/#website"},"inLanguage":"es"}]}
    </script>
</head>
<body>
    <a class="skip-link" href="#main">Ir al contenido principal</a>

    <ecommerce-header translate="no" class="notranslate"></ecommerce-header>

    <main id="main" class="cart-page">
        <nav class="cart-breadcrumbs" aria-label="Migas de pan">
            <a href="/es/">Home</a>
            <span class="sep" aria-hidden="true">/</span>
            <span aria-current="page">Carrito</span>
        </nav>

        <h1>Carrito</h1>
        <p class="cart-lead">El carrito se guarda en este navegador (localStorage). Los precios deben coincidir con la ficha de producto y el checkout final.</p>

        <div
            id="aml-cart-app"
            data-label-remove="Quitar"
            data-qty-aria="Cantidad"
            data-label-qty-minus="Reducir cantidad para"
            data-label-qty-plus="Aumentar cantidad para"
        >
            <div id="aml-cart-empty" class="cart-empty-panel">
                <p>Su carrito está vacío.</p>
                <p><a class="cart-btn cart-btn-primary" href="/es/#catalogo">Volver al catálogo</a></p>
            </div>

            <div id="aml-cart-filled" class="cart-filled" hidden>
                <div class="cart-table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th scope="col">Producto</th>
                                <th scope="col">Cant.</th>
                                <th scope="col">Subtotal</th>
                                <th scope="col"><span class="visually-hidden">Acciones</span></th>
                            </tr>
                        </thead>
                        <tbody id="aml-cart-lines"></tbody>
                    </table>
                </div>
                <p class="cart-total-row">Total: <strong id="aml-cart-total">—</strong></p>
                <div class="cart-actions">
                    <a class="cart-btn cart-btn-primary" href="/es/checkout.html">Ir al pago</a>
                </div>
            </div>
        </div>
    </main>

    <aml-cookie-banner></aml-cookie-banner>
    <ecommerce-footer translate="no" class="notranslate"></ecommerce-footer>

    <script src="../js/locale-path.js"></script>
    <script src="../js/cart.js" defer></script>
    <script src="../components/cookie-banner.js" defer></script>
    <script src="../components/header.js" defer></script>
    <script src="../components/footer.js" defer></script>
</body>
</html>
